# Cog config to deploy SkyTNT/midi-model (tv2o-medium, Apache-2.0) as a
# Replicate model for AI MIDI Studio's "Generate" (text/param → MIDI).
#
# This file + predict.py drop INTO a clone of github.com/SkyTNT/midi-model
# (so `from midi_model import ...` / `import MIDI` resolve). See README.md.
#
# Inference only: we drop the repo's gradio / lightning / pyfluidsynth deps
# (UI, training, audio-render) to keep the image small and cold-start short.
build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  python_packages:
    - "torch==2.4.0"
    - "numpy<2"
    - "safetensors>=0.4.3"
    - "transformers>=4.36"
    - "peft>=0.13.0"
    - "huggingface_hub>=0.24"
    - "tqdm"
  # MIDI.py ships vendored in the SkyTNT/midi-model repo (pure Python) — no dep.
  run:
    # Bake the model weights into the image at BUILD time so that:
    #  (1) cold start loads from local disk (seconds, not a multi-minute
    #      download) — and won't blow Replicate's boot health-check timeout;
    #  (2) setup() needs no network access.
    # Only the files we actually load (config + safetensors) — skip the repo's
    # logs/, onnx/, and the redundant pytorch_model.bin to keep the image lean.
    # Retry loop: GitHub runners share IPs that HuggingFace often rate-limits
    # (HTTP 429). Transient — a few retries with backoff clears it.
    - |
      ok=0
      for i in 1 2 3 4 5 6 7 8; do
        if python -c "from huggingface_hub import snapshot_download; snapshot_download('skytnt/midi-model-tv2o-medium', allow_patterns=['config.json','generation_config.json','model.safetensors'])"; then ok=1; break; fi
        echo "HF download attempt $i failed; sleeping 30s before retry..."; sleep 30
      done
      [ "$ok" = "1" ] || { echo "ERROR: HF weight download failed after 8 retries"; exit 1; }

predict: "predict.py:Predictor"
